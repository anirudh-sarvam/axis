    <b>Security Considerations</b>


    Following are the security considerations which will need to be followed by
    the consumers for successful connectivity with the application:




    <b>1.API Keys</b>


    Consumer will be provided with a client id and client secret. The consumer

    has to pass the unique client id and secret in each and every request header

    to be able to successfully consume the API. These will be used for

    authentication and authorization




    <b>2.Two way SSL</b>


    Consumer needs to invoke the application over HTTPS protocol. We also have

    two way SSL established. This means that we would be validating the consumer

    certificate. Hence it is required that the consumer sends a CSR to us, we

    will sign the same and return the signed certificate to consumer.

    Certificate shared should be valid and should have the usage for client ssl.

    We will use TLSv1.2 protocol




    <b>3.IP Whitelisting</b>


    We allow only select IP addresses to access our application over the

    internet. Hence as a consumer it may be required to whitelist all the IP

    addresses that the consumer would be consuming the application from. This

    step is a prerequisite to setup successful connectivity.




    <b>4.JWE Encryption and Signing</b>

    The API to be invoked accepts the request body encrypted using JWE

    encryption and signing.


    Encryption Mechanism : JWE


    Key Encryption Algorithm : RSA-OAEP-256


    Content Encryption Method : A256GCM


    Signing Algorithm : RS256   
  x-ibm-name: partnerai-chub-outbound-send-message
  title: partnerAI CHUB Outbound Send Message
servers:
  - url: /api/v1/partnerai/chub/outbound
x-ibm-configuration:
  cors:
    enabled: true
    policy:
      - allow-origin:
          - https://nondmz-gateway.uat.axisb.com
          - https://nondmz-gateway.prod.axisb.com
  buffering: true
paths:
  /send-message:
    post:
      responses:
        '200':
          description: success
          headers:
            x-api-response-from:
              schema:
                type: string
              required: true
              description: >-
                indicates the service that generated the api response possible
                values are apiGateway/chub-sendMessage
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/response1'
                  - $ref: '#/components/schemas/response2'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/invalidJsonErr'
                  - $ref: '#/components/schemas/sqlInjErr'
                  - $ref: '#/components/schemas/xssErr'
                  - $ref: '#/components/schemas/mandantoryHeadersErr'
                  - $ref: '#/components/schemas/mandatoryFieldsErr'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/clientidError'
                  - $ref: '#/components/schemas/chubErrorResponse'
      parameters:
        - name: x-fapi-channel-id
          schema:
            type: string
          required: true
          in: header
          description: >-
            This header will be used to identify the consuming channel of the
            API.  Each consumer can have a different channel code.
        - name: x-fapi-epoch-millis
          schema:
            type: string
          required: true
          in: header
          description: >-
            The Epoch millis at the time of hitting the API request. Axis bank
            will verify the header to ensure that the request isn’t too old.
        - name: x-fapi-uuid
          schema:
            type: string
          required: true
          in: header
          description: >-
            Unique alphanumeric Id (without special characters) should be
            generated by consumer. It should be unique for each request
        - name: x-fapi-serviceId
          schema:
            type: string
          in: header
          description: x-fapi-serviceId
        - name: x-fapi-serviceVersion
          schema:
            type: string
          in: header
          description: x-fapi-serviceVersion
        - name: X-IBM-Client-Id
          schema:
            type: string
          in: header
          description: Unique id of the consumer invoking the API.
        - name: X-IBM-Client-Secret
          schema:
            type: string
          in: header
          description: Unique secret key of the consumer invoking the API.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request'
